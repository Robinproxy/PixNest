<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixNest</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='5' width='26' height='22' rx='6' fill='%238fa99b'/%3E%3Cpath d='M7 22l5.5-7 4 5 3-3.5L25 22H7z' fill='%23c9d6cd'/%3E%3Ccircle cx='12' cy='12' r='2.2' fill='%23f0d68a'/%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #faf7f2;
            --card: #fffdf9;
            --text-main: #4a4540;
            --text-muted: #8a8278;
            --border: #ece6dd;
            --accent: #8fa99b;
            --accent-hover: #7a9486;
            --accent-soft: #eef2ee;
            --success-bg: #e7f0e3;
            --success-text: #5a7a55;
            --danger: #c98b7e;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; min-height: 100vh; align-items: flex-start; padding-top: 5vh; -webkit-font-smoothing: antialiased; }

        .container { background: var(--card); border-radius: 24px; box-shadow: 0 8px 32px -12px rgba(74,69,64,0.08); width: 100%; max-width: 860px; padding: 40px; box-sizing: border-box; margin: 0 20px 40px; border: 1px solid #f0ebe2; }

        #loginView { position: fixed; inset: 0; padding: 48px 48px 48px min(10vw, 140px); box-sizing: border-box; display: flex; flex-direction: column; background: var(--bg); text-align: left; overflow: auto; }
        .icon-svg { stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .logo-mark { width: 40px; height: 40px; display: block; }
        .login-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; letter-spacing: -0.3px; color: var(--text-main); }
        .login-brand .logo-mark { width: 28px; height: 28px; }
        .login-form { margin: auto 0; max-width: 380px; width: 100%; }
        .login-headline { font-size: 30px; font-weight: 700; letter-spacing: -0.6px; line-height: 1.1; margin: 0 0 14px; }
        .login-sub { color: var(--text-muted); font-size: 15px; margin: 0 0 32px; }
        .login-input-row { display: flex; gap: 10px; align-items: stretch; }
        .login-input { flex: 1; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); font-size: 15px; outline: none; color: var(--text-main); transition: 0.25s var(--ease); box-sizing: border-box; }
        .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(143, 169, 155, 0.12); }
        .login-go { width: 52px; border: none; border-radius: 14px; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.25s var(--ease); box-shadow: 0 4px 14px rgba(143, 169, 155, 0.25); }
        .login-go:hover { background: var(--accent-hover); }
        .login-go .icon-svg { stroke-width: 2; }
        .login-foot { margin: 20px 0 0; font-size: 12px; color: var(--text-muted); }
        .input-box { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border); font-size: 15px; text-align: center; margin-bottom: 24px; box-sizing: border-box; outline: none; transition: 0.25s var(--ease); background: #f5f1ea; color: var(--text-main); }
        .input-box:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(143, 169, 155, 0.12); }
        .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.25s var(--ease); box-shadow: 0 4px 14px rgba(143, 169, 155, 0.25); }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(143, 169, 155, 0.3); }

        #mainView { position: fixed; inset: 0; display: none; }
        .sidebar { width: 220px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); padding: 32px 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .sidebar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; letter-spacing: -0.3px; color: var(--text-main); margin-bottom: 40px; }
        .sidebar-brand .logo-mark { width: 28px; height: 28px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .side-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: none; background: transparent; color: var(--text-muted); font-size: 14px; font-weight: 500; border-radius: 10px; cursor: pointer; transition: 0.25s var(--ease); text-align: left; font-family: inherit; width: 100%; box-sizing: border-box; }
        .side-item:hover { background: var(--accent-soft); color: var(--text-main); }
        .side-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
        .side-logout { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border: none; background: transparent; color: var(--danger); font-size: 13px; border-radius: 10px; cursor: pointer; transition: 0.25s var(--ease); text-align: left; font-family: inherit; width: 100%; box-sizing: border-box; }
        .side-logout:hover { background: rgba(201,139,126,0.12); }
        .side-link { display: flex; align-items: center; gap: 8px; padding: 10px 14px; color: var(--text-muted); font-size: 13px; border-radius: 10px; text-decoration: none; transition: 0.25s var(--ease); margin-top: 8px; }
        .side-link:hover { background: var(--accent-soft); color: var(--accent); }

        .content { flex: 1; overflow-y: auto; padding: 48px 48px 48px min(6vw, 80px); box-sizing: border-box; }

        .drop-bar { border: 1.5px dashed var(--border); border-radius: 18px; padding: 44px 24px; text-align: center; cursor: pointer; background: var(--card); transition: all 0.3s var(--ease); margin-bottom: 20px; }
        .drop-bar:hover { border-color: var(--accent); background: var(--accent-soft); }
        .drop-bar svg { color: var(--text-muted); margin-bottom: 12px; width: 40px; height: 40px; transition: 0.3s var(--ease); }
        .drop-bar:hover svg { color: var(--accent); transform: translateY(-2px); }
        .drop-bar-title { font-size: 15px; font-weight: 600; color: var(--text-main); margin-bottom: 6px; }
        .drop-bar-sub { color: var(--text-muted); font-size: 13px; }

        .settings-bar { display: flex; flex-wrap: wrap; gap: 20px; padding: 16px 20px; background: #f5f1ea; border-radius: 14px; font-size: 14px; align-items: center; border: 1px solid var(--border); }
        .settings-bar label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 500;}
        .ui-input { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 13px; outline: none; color: var(--text-main); transition: 0.25s var(--ease); }
        .ui-input:focus { border-color: var(--accent); }

        .range-wrap { display: flex; align-items: center; gap: 8px; margin-left: -10px; }
        input[type="range"] { width: 80px; accent-color: var(--accent); cursor: pointer; }
        .q-val { font-size: 12px; font-family: monospace; color: var(--accent); font-weight: bold; width: 24px; }

        .result-box { margin-top: 24px; padding: 24px; border-radius: 18px; background: #eef4ea; border: 1px solid #cdddc4; display: none; text-align: center; }
        .url-display { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 13px; font-family: monospace; color: var(--text-main); outline: none; background: #fff; box-sizing: border-box; text-align: center; margin-bottom: 16px; transition: 0.25s var(--ease); }

        .format-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .fmt-btn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-main); transition: 0.25s var(--ease); display: flex; align-items: center; gap: 6px; }
        .fmt-btn:hover { background: #f2ede5; }

        .fmt-btn.active-link { background: var(--success-bg); border-color: var(--success-bg); color: var(--success-text); }
        .fmt-btn.active-code { border-color: var(--text-main); color: var(--text-main); box-shadow: 0 0 0 1px var(--text-main); }

        .gallery { display: none; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
        .g-card { border-radius: 16px; background: var(--card); overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 12px -4px rgba(74,69,64,0.08); transition: 0.25s var(--ease); }
        .g-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px -6px rgba(74,69,64,0.12); }

        .g-img-box { position: relative; aspect-ratio: 4 / 3; background-color: #f5f1ea; display: block; overflow: hidden; }
        .g-img-box img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s var(--ease); }
        .g-card:hover .g-img-box img { transform: scale(1.03); }

        .g-del { position: absolute; top: 10px; right: 10px; background: rgba(255,253,249,0.9); backdrop-filter: blur(4px); color: var(--danger); border: none; border-radius: 10px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.25s var(--ease); opacity: 0; }
        .g-card:hover .g-del { opacity: 1; }
        .g-del:hover { background: var(--danger); color: #fff; }

        .g-info { padding: 12px 16px 14px; }
        .g-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .g-meta { font-size: 11px; color: #b3aa9d; margin-bottom: 10px; letter-spacing: 0.2px; }
        .g-expire { color: #b08a55; }
        .g-copy-row { gap: 4px; }
        .g-copy-row .fmt-btn { padding: 6px 8px; flex: 1; justify-content: center; font-size: 12px; border: none; background: transparent; color: var(--text-muted); box-shadow: none; }
        .g-copy-row .fmt-btn:hover { background: var(--accent-soft); color: var(--accent); }
        .g-copy-row .fmt-btn.active-link { background: var(--success-bg); color: var(--success-text); }
        .g-copy-row .fmt-btn.active-code { color: var(--text-main); font-weight: 700; }

        .lightbox { position: fixed; inset: 0; background: rgba(45,40,35,0.92); display: none; align-items: center; justify-content: center; z-index: 1000; cursor: zoom-out; opacity: 0; transition: opacity 0.25s var(--ease); }
        .lightbox.open { display: flex; opacity: 1; }
        .lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); cursor: default; transform: scale(0.96); transition: transform 0.25s var(--ease); }
        .lightbox.open img { transform: scale(1); }
        .lb-close { position: absolute; top: 24px; right: 24px; width: 40px; height: 40px; border: none; border-radius: 50%; background: rgba(255,253,249,0.15); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.25s var(--ease); }
        .lb-close:hover { background: rgba(255,253,249,0.3); }
        .g-img-box img { cursor: zoom-in; }
    </style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="pixnest-logo" viewBox="0 0 32 32">
        <rect x="3" y="5" width="26" height="22" rx="6" fill="#8fa99b"/>
        <path d="M7 22l5.5-7 4 5 3-3.5L25 22H7z" fill="#c9d6cd"/>
        <circle cx="12" cy="12" r="2.2" fill="#f0d68a"/>
    </symbol>
</svg>

<div id="loginView">
    <div class="login-brand">
        <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true"><use href="#pixnest-logo"/></svg>
        <span>PixNest</span>
    </div>
    <div class="login-form">
        <h1 class="login-headline">Your images,<br>in one place.</h1>
        <p class="login-sub">Enter your access key to continue</p>
        <div class="login-input-row">
            <input type="password" id="passInput" class="login-input" placeholder="Access key" onkeydown="if(event.key==='Enter') login()">
            <button class="login-go" onclick="login()" aria-label="Enter">
                <svg class="icon-svg" style="width:20px;height:20px;" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
        <p class="login-foot">Invited access only · <a href="https://github.com/Robinproxy/PixNest" target="_blank" rel="noopener" style="color: var(--accent); text-decoration: none;">GitHub</a></p>
    </div>
</div>

<div id="mainView">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true"><use href="#pixnest-logo"/></svg>
            <span>PixNest</span>
        </div>
        <nav class="sidebar-nav">
            <button class="side-item active" id="tabUpload" onclick="switchTab('upload')">
                <svg class="icon-svg" style="width:18px;height:18px;" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Upload
            </button>
            <button class="side-item" id="tabGallery" onclick="switchTab('gallery')">
                <svg class="icon-svg" style="width:18px;height:18px;" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                Gallery
            </button>
        </nav>
        <button class="side-logout" onclick="logout()">
            <svg class="icon-svg" style="width:16px;height:16px;" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
        </button>
        <a class="side-link" href="https://github.com/Robinproxy/PixNest" target="_blank" rel="noopener">
            <svg class="icon-svg" style="width:16px;height:16px;" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
            GitHub
        </a>
    </aside>

    <main class="content">
        <section id="panelUpload">
            <div class="drop-bar" id="dropZone">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <div class="drop-bar-title">Drop, paste, or click to upload</div>
                <div class="drop-bar-sub">WebP compression · EXIF stripped · Optional expiry</div>
            </div>
            <input type="file" id="fileInput" style="display: none;" accept="image/*">

            <div class="settings-bar">
                <label><input type="checkbox" id="cWebp" checked> WebP</label>
                <div class="range-wrap">
                    <input type="range" id="cQual" min="10" max="100" value="90" oninput="document.getElementById('qv').innerText=this.value">
                    <span class="q-val" id="qv">90</span>
                </div>

                <label style="margin-left: 10px;"><input type="checkbox" id="cWm"> Watermark</label>
                <input type="text" id="vWm" class="ui-input" placeholder="@PixNest" style="width: 120px;">

                <select id="cExp" class="ui-input" style="margin-left: auto;">
                    <option value="0">Keep forever</option>
                    <option value="1">1 day</option>
                    <option value="7">7 days</option>
                </select>
            </div>

            <div class="result-box" id="resultBox"></div>
        </section>

        <section class="gallery" id="panelGallery"></section>
    </main>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
    <button class="lb-close" onclick="closeLightbox()" aria-label="Close">
        <svg class="icon-svg" style="width:18px;height:18px;stroke-width:2;" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>

<script>
    const $ = id => document.getElementById(id);
    const TOKEN_KEY = 'pixnest_token';
    const LEGACY_TOKEN_KEY = 'nano_token';

    function getToken() {
        let t = localStorage.getItem(TOKEN_KEY);
        if (!t) {
            t = localStorage.getItem(LEGACY_TOKEN_KEY);
            if (t) {
                localStorage.setItem(TOKEN_KEY, t);
                localStorage.removeItem(LEGACY_TOKEN_KEY);
            }
        }
        return t;
    }

    function setToken(t) {
        localStorage.setItem(TOKEN_KEY, t);
        localStorage.removeItem(LEGACY_TOKEN_KEY);
    }

    function clearToken() {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(LEGACY_TOKEN_KEY);
    }

    function showMain(ok) {
        $('loginView').style.display = ok ? 'none' : 'flex';
        $('mainView').style.display = ok ? 'flex' : 'none';
    }

    async function checkLogin() {
        const token = getToken();
        if (!token) {
            showMain(false);
            return;
        }
        try {
            const res = await fetch('/verify', { headers: { 'X-Auth-Token': token } });
            if (res.ok) showMain(true);
            else { clearToken(); showMain(false); }
        } catch (e) {
            showMain(true);
        }
    }
    checkLogin();

    async function login() {
        const pwd = $('passInput').value.trim();
        if (!pwd) return alert('Please enter the access key');
        try {
            const res = await fetch('/verify', { headers: { 'X-Auth-Token': pwd } });
            if (res.ok) { setToken(pwd); showMain(true); }
            else alert('Wrong access key');
        } catch (error) { alert('Server not responding'); }
    }

    function logout() { clearToken(); $('passInput').value = ''; showMain(false); }

    function switchTab(tab) {
        $('tabUpload').classList.toggle('active', tab === 'upload');
        $('tabGallery').classList.toggle('active', tab === 'gallery');
        $('panelUpload').style.display = tab === 'upload' ? 'block' : 'none';
        $('panelGallery').style.display = tab === 'gallery' ? 'grid' : 'none';
        if (tab === 'gallery') loadGallery();
    }

    const dz = $('dropZone');
    dz.onclick = () => $('fileInput').click();
    $('fileInput').onchange = e => handleFiles(e.target.files);
    document.onpaste = e => { if (e.clipboardData.files.length) handleFiles(e.clipboardData.files); };
    ['dragover', 'dragleave', 'drop'].forEach(evt => dz.addEventListener(evt, e => e.preventDefault()));
    dz.addEventListener('drop', e => handleFiles(e.dataTransfer.files));

    async function handleFiles(files) {
        if (!files.length) return;
        const file = files[0];
        const token = getToken();
        if (!token) return logout();

        const rb = $('resultBox');
        rb.style.display = 'block';
        rb.innerHTML = '<div style="font-weight: 600; color: var(--success-text);">Processing & uploading...</div>';

        try {
            let finalFile = file;
            if (file.type !== 'image/gif') {
                try {
                    finalFile = await processImg(file, $('cWebp').checked, parseInt($('cQual').value) / 100, $('cWm').checked ? $('vWm').value : '');
                } catch (e) {
                    finalFile = file;
                }
            }

            const fd = new FormData();
            fd.append('file', finalFile, finalFile.name || file.name);
            fd.append('expire_days', $('cExp').value);

            const res = await fetch('/upload', { method: 'POST', headers: { 'X-Auth-Token': token }, body: fd });
            if (res.status === 401) return logout();
            const data = await res.json().catch(() => ({}));

            if (res.ok) {
                try { await navigator.clipboard.writeText(data.url); } catch (e) {}

                const uid = 'up-' + Date.now();
                rb.innerHTML = `
                    <div style="color: var(--success-text); font-weight: 600; font-size: 18px; margin-bottom: 16px;">
                        Uploaded
                    </div>
                    <input type="text" id="url-${uid}" class="url-display" value="${data.url}" readonly onclick="this.select()">
                    <div class="format-group" id="grp-${uid}">
                        <button class="fmt-btn active-link" onclick="updateFormat('${uid}', this, '${data.url}', 'link')">Link</button>
                        <button class="fmt-btn" onclick="updateFormat('${uid}', this, '<img src=&quot;${data.url}&quot;>', 'code')">&lt;/&gt; HTML</button>
                        <button class="fmt-btn" onclick="updateFormat('${uid}', this, '![img](${data.url})', 'code')">Markdown</button>
                        <button class="fmt-btn" onclick="updateFormat('${uid}', this, '[img]${data.url}[/img]', 'code')">BBCode</button>
                    </div>
                `;
            } else {
                const detail = data.detail || 'Upload failed';
                rb.innerHTML = `<div style="color: red;">${typeof detail === 'string' ? detail : 'Upload failed'}</div>`;
            }
        } catch (e) {
            rb.innerHTML = '<div style="color: red;">Something went wrong</div>';
        }
    }

    async function updateFormat(uid, btn, text, styleType) {
        try { await navigator.clipboard.writeText(text); } catch (e) {}

        const input = $('url-' + uid);
        if (input) {
            input.value = text;
            input.style.backgroundColor = '#fef08a';
            setTimeout(() => input.style.backgroundColor = '#fff', 300);
        }

        const group = $('grp-' + uid);
        Array.from(group.children).forEach(b => {
            b.classList.remove('active-link', 'active-code');
        });

        if (styleType === 'link') {
            btn.classList.add('active-link');
        } else {
            btn.classList.add('active-code');
        }
    }

    function formatExpire(expireAt) {
        if (!expireAt) return '';
        const d = new Date(expireAt * 1000);
        return ` · <span class="g-expire">expires ${d.toLocaleDateString()}</span>`;
    }

    let galleryPage = 1;
    const GALLERY_SIZE = 30;

    function galleryCardHtml(img) {
        const dateStr = new Date(img.time * 1000).toLocaleDateString();
        const uid = 'gal-' + img.filename.replace(/[^a-zA-Z0-9_-]/g, '');
        const safeName = img.filename.replace(/'/g, "\\'");
        return `
                <div class="g-card" id="card-${img.filename}">
                    <div class="g-img-box">
                        <img src="${img.url}" loading="lazy" onclick="openLightbox('${img.url}')">
                        <button class="g-del" title="Delete" onclick="del('${safeName}')">
                            <svg class="icon-svg" style="width:14px;height:14px;" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                    <div class="g-info">
                        <div class="g-meta">${dateStr}${formatExpire(img.expire_at)}</div>
                        <div class="format-group g-copy-row" id="grp-${uid}">
                            <button class="fmt-btn active-link" onclick="updateFormat('${uid}', this, '${img.url}', 'link')">Link</button>
                            <button class="fmt-btn" onclick="updateFormat('${uid}', this, '<img src=&quot;${img.url}&quot;>', 'code')">&lt;/&gt;</button>
                            <button class="fmt-btn" onclick="updateFormat('${uid}', this, '![img](${img.url})', 'code')">MD</button>
                            <button class="fmt-btn" onclick="updateFormat('${uid}', this, '[img]${img.url}[/img]', 'code')">BB</button>
                        </div>
                    </div>
                </div>`;
    }

    function renderGalleryPage(data, replace) {
        const pg = $('panelGallery');
        const oldMore = document.getElementById('loadMoreBtn');
        if (oldMore) oldMore.remove();
        if (replace) pg.innerHTML = '';
        if (replace && !data.images.length) {
            pg.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">No images yet</div>';
            return;
        }
        pg.insertAdjacentHTML('beforeend', data.images.map(galleryCardHtml).join(''));
        if (galleryPage * GALLERY_SIZE < data.total) {
            const btn = document.createElement('div');
            btn.id = 'loadMoreBtn';
            btn.style.cssText = 'grid-column: 1/-1; text-align: center; padding: 20px;';
            btn.innerHTML = '<button class="fmt-btn" style="padding: 12px 32px;" onclick="loadMoreGallery()">Load more</button>';
            pg.appendChild(btn);
        }
    }

    async function loadGallery() {
        galleryPage = 1;
        const pg = $('panelGallery');
        pg.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">Loading...</div>';
        try {
            const res = await fetch(`/api/history?page=1&size=${GALLERY_SIZE}`, { headers: { 'X-Auth-Token': getToken() } });
            if (res.status === 401) return logout();
            const data = await res.json();
            renderGalleryPage(data, true);
        } catch (e) {
            pg.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: red;">Failed to load</div>';
        }
    }

    async function loadMoreGallery() {
        galleryPage++;
        try {
            const res = await fetch(`/api/history?page=${galleryPage}&size=${GALLERY_SIZE}`, { headers: { 'X-Auth-Token': getToken() } });
            if (res.status === 401) return logout();
            const data = await res.json();
            renderGalleryPage(data, false);
        } catch (e) {
            galleryPage--;
        }
    }

    async function del(filename) {
        if (!confirm('Permanently delete this image?')) return;
        const res = await fetch(`/api/delete/${encodeURIComponent(filename)}`, {
            method: 'DELETE',
            headers: { 'X-Auth-Token': getToken() }
        });
        if (res.status === 401) return logout();
        if (res.ok) {
            const el = document.getElementById('card-' + filename);
            if (el) el.remove();
        } else {
            alert('Failed to delete');
        }
    }

    function openLightbox(url) {
        $('lightboxImg').src = url;
        $('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        $('lightbox').classList.remove('open');
        $('lightboxImg').src = '';
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    function processImg(file, toWebp, q, wmText) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const objUrl = URL.createObjectURL(file);
            img.src = objUrl;
            img.onload = () => {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    if (wmText) {
                        const fontSize = Math.max(20, img.width * 0.04);
                        ctx.font = `bold ${fontSize}px sans-serif`;
                        ctx.fillStyle = "rgba(255,255,255,0.8)";
                        ctx.textAlign = "right";
                        ctx.shadowColor = "rgba(0,0,0,0.5)";
                        ctx.shadowBlur = 4;
                        ctx.fillText(wmText, img.width - 20, img.height - 20);
                    }

                    const mime = toWebp ? 'image/webp' : (file.type || 'image/png');
                    const base = (file.name || 'image').replace(/\.[^.]+$/, '');
                    const ext = toWebp ? 'webp' : ((file.name || '').split('.').pop() || 'png');
                    const outName = `${base}.${ext}`;

                    const effQ = toWebp ? q : 0.95;
                    canvas.toBlob(blob => {
                        URL.revokeObjectURL(objUrl);
                        if (!blob) return reject(new Error('encode failed'));
                        resolve(new File([blob], outName, { type: mime }));
                    }, mime, effQ);
                } catch (err) {
                    URL.revokeObjectURL(objUrl);
                    reject(err);
                }
            };
            img.onerror = () => {
                URL.revokeObjectURL(objUrl);
                reject(new Error('image load failed'));
            };
        });
    }
</script>
